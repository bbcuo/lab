<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 实验站点</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: #888; margin-top: 8px; text-align: center; }
    .warning {
      background: rgba(255,193,7,0.15);
      border: 1px solid rgba(255,193,7,0.3);
      border-radius: 8px;
      padding: 16px 20px;
      margin: 30px 0;
      color: #ffc107;
      max-width: 600px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 24px;
      margin: 20px auto;
      max-width: 600px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card h2 { color: #00d2ff; margin-bottom: 10px; }
    .card p { color: #aaa; line-height: 1.6; }
    footer { margin-top: 40px; color: #555; }
    footer a { color: #3a7bd5; text-decoration: none; }
  </style>
</head>
<body>
<header>
  <h1>🧪 实验站点</h1>
  <p>这里是我用来做各种实验和测试的地方</p>
</header>

<div class="warning">
  ⚠️ 这是一个实验性站点，内容随时可能变化。
</div>

<div class="card">
  <h2>📌 实验 #1</h2>
  <p>在这里开始你的第一个实验，尽情发挥！</p>
</div>

<footer>
  <p>← 返回 <a href="https://bbcuo.github.io/">主站点</a></p>
</footer>
</body>
</html>
